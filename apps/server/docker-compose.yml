services:
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    working_dir: /app
    volumes:
      - ./api:/app
      - ./storage:/srv/storage
    environment:
      APP_STORAGE: /srv/storage
      DB_PATH: /srv/storage/jobs.sqlite
      QUEUE_DIR: /srv/storage/queue
      INPUT_DIR: /srv/storage/input
      OUTPUT_DIR: /srv/storage/output

  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    working_dir: /app
    command: ["python", "/app/process_jobs.py"]
    volumes:
      - ./worker:/app
      - ./storage:/srv/storage
    environment:
      APP_STORAGE: /srv/storage
      DB_PATH: /srv/storage/jobs.sqlite
      QUEUE_DIR: /srv/storage/queue
      INPUT_DIR: /srv/storage/input
      OUTPUT_DIR: /srv/storage/output
      WORK_DIR: /srv/storage/work
      WORKER_POLL_SECONDS: ${WORKER_POLL_SECONDS:-2}
      SOURCE_CACHE_RETENTION_DAYS: ${SOURCE_CACHE_RETENTION_DAYS:-60}
      SOURCE_DOWNLOAD_TIMEOUT_SECONDS: ${SOURCE_DOWNLOAD_TIMEOUT_SECONDS:-900}
      LOCAL_PROCESSOR_BASE_URL: ${LOCAL_PROCESSOR_BASE_URL:-http://host.docker.internal:8081/adfree-api}
      LOCAL_PROCESSOR_TIMEOUT_SECONDS: ${LOCAL_PROCESSOR_TIMEOUT_SECONDS:-14400}
